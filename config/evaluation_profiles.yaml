# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║              evaluation_profiles.yaml — SCRIBE Evaluation Profile Registry   ║
# ║                                                                              ║
# ║  SCRIBE = the summarization system. These profiles define HOW to evaluate    ║
# ║  the quality of a SCRIBE-generated summary.                                  ║
# ║                                                                              ║
# ║  NOTE: TRACE (complaint classification) is a SEPARATE evaluation system.     ║
# ║  It is NOT evaluated here. SCRIBE evaluation focuses purely on summary       ║
# ║  quality: faithfulness, coverage, action clarity, entity accuracy, etc.      ║
# ║                                                                              ║
# ║  Each profile defines:                                                       ║
# ║    pass_threshold / fail_threshold  — profile-level scoring cutoffs          ║
# ║    criteria                         — map of criterion → settings            ║
# ║        enabled       : true/false  — run this criterion for this profile     ║
# ║        judge_model   : which Ollama model evaluates this criterion            ║
# ║        weight        : contribution to weighted average (default 1.0)        ║
# ║        pass_threshold: per-criterion pass cutoff (optional, overrides profile)║
# ║        fail_threshold: per-criterion fail cutoff (optional, overrides profile)║
# ║                                                                              ║
# ║  Verdict Logic (Option B — strict):                                          ║
# ║    PASS         → weighted_avg ≥ profile pass_threshold                      ║
# ║                   AND no single criterion below its fail_threshold            ║
# ║    FAIL         → weighted_avg < profile fail_threshold                      ║
# ║                   OR any individual criterion below its fail_threshold        ║
# ║    NEEDS_REVIEW → everything else                                             ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

profiles:

  # ─────────────────────────────────────────────────────────────────────────────
  # STANDARD: Default profile for general, low-risk complaints
  # prompt_mode: per_criterion — every metric gets its own individual LLM call
  # Models: mistral (primary), llama3.2 (lightweight)
  # ─────────────────────────────────────────────────────────────────────────────
  standard:
    description: "Default evaluation for general banking complaints"
    pass_threshold: 0.75
    fail_threshold: 0.50
    prompt_mode: per_criterion   # each criterion → its own LLM call, its own prompt
    criteria:

      faithfulness:
        enabled: true
        judge_model: mistral
        prompt: faithfulness          # standard faithfulness check
        weight: 1.5
        pass_threshold: 0.75
        fail_threshold: 0.50

      coverage:
        enabled: true
        judge_model: mistral
        prompt: coverage
        weight: 1.0
        pass_threshold: 0.75
        fail_threshold: 0.50

      action_orientedness:
        enabled: true
        judge_model: mistral
        prompt: action_orientedness
        weight: 1.0
        pass_threshold: 0.75
        fail_threshold: 0.50

      conciseness:
        enabled: true
        judge_model: llama3.2
        prompt: quality_combined      # combined call with clarity + entity_preservation
        weight: 0.75
        pass_threshold: 0.60
        fail_threshold: 0.40

      clarity:
        enabled: true
        judge_model: llama3.2
        prompt: quality_combined      # same combined call
        weight: 0.75
        pass_threshold: 0.60
        fail_threshold: 0.40

      urgency_tone:
        enabled: false
        judge_model: mistral
        prompt: urgency_tone
        weight: 0.75
        pass_threshold: 0.60
        fail_threshold: 0.40

      entity_preservation:
        enabled: true
        judge_model: mistral
        prompt: quality_combined      # same combined call
        weight: 1.0
        pass_threshold: 0.75
        fail_threshold: 0.50

  # ─────────────────────────────────────────────────────────────────────────────
  # STRINGENT: High-risk and compliance complaints
  # prompt_mode: mixed — faithfulness/coverage/urgency are standalone calls;
  #   conciseness/clarity/entity_preservation share one combined call
  # Models: gemma3:4b (critical criteria), mistral (rest), llama3.2 (lightweight)
  # ─────────────────────────────────────────────────────────────────────────────
  stringent:
    description: "High-risk / compliance complaints — all metrics, tighter thresholds"
    pass_threshold: 0.80
    fail_threshold: 0.60
    prompt_mode: mixed           # some single, some combined — balanced approach
    criteria:

      faithfulness:
        enabled: true
        judge_model: gemma3:4b
        prompt: faithfulness_strict   # strict — inferences penalised same as hallucinations
        weight: 2.0
        pass_threshold: 0.85
        fail_threshold: 0.65

      coverage:
        enabled: true
        judge_model: gemma3:4b
        prompt: coverage
        weight: 2.0
        pass_threshold: 0.80
        fail_threshold: 0.60

      action_orientedness:
        enabled: true
        judge_model: mistral
        prompt: action_orientedness
        weight: 1.5
        pass_threshold: 0.80
        fail_threshold: 0.60

      conciseness:
        enabled: true
        judge_model: llama3.2
        prompt: quality_combined
        weight: 1.0
        pass_threshold: 0.70
        fail_threshold: 0.50

      clarity:
        enabled: true
        judge_model: llama3.2
        prompt: quality_combined
        weight: 1.0
        pass_threshold: 0.70
        fail_threshold: 0.50

      urgency_tone:
        enabled: true
        judge_model: mistral
        prompt: urgency_tone
        weight: 1.5
        pass_threshold: 0.75
        fail_threshold: 0.55

      entity_preservation:
        enabled: true
        judge_model: gemma3:4b
        prompt: quality_combined
        weight: 2.0
        pass_threshold: 0.85
        fail_threshold: 0.65

  # ─────────────────────────────────────────────────────────────────────────────
  # FRAUD_FOCUSED: Fraud / unauthorised transaction complaints
  # prompt_mode: all_in_one — ONE LLM call evaluates ALL criteria at once
  #   Uses fraud_all_criteria prompt with investigation/fact-checking framing.
  #   Most efficient: saves 5-6 LLM calls vs per_criterion.
  # Models: gemma3:4b (the single call uses the main judge_model here)
  # ─────────────────────────────────────────────────────────────────────────────
  fraud_focused:
    description: "Fraud complaints — deep faithfulness and entity checks"
    pass_threshold: 0.78
    fail_threshold: 0.55
    prompt_mode: all_in_one        # ONE call for ALL criteria — fraud investigation framing
    combined_prompt: fraud_all_criteria
    criteria:

      faithfulness:
        enabled: true
        judge_model: gemma3:4b
        prompt: faithfulness_strict   # strict — no inferences allowed on fraud cases
        weight: 3.0             # triple-weighted — a hallucinated amount is dangerous
        pass_threshold: 0.80
        fail_threshold: 0.60

      coverage:
        enabled: true
        judge_model: gemma3:4b
        prompt: coverage
        weight: 2.0
        pass_threshold: 0.78
        fail_threshold: 0.58

      action_orientedness:
        enabled: true
        judge_model: mistral
        prompt: action_orientedness
        weight: 1.5
        pass_threshold: 0.75
        fail_threshold: 0.55

      conciseness:
        enabled: false
        judge_model: llama3.2
        prompt: quality_combined
        weight: 0.5
        pass_threshold: 0.55
        fail_threshold: 0.35

      clarity:
        enabled: true
        judge_model: llama3.2
        prompt: quality_combined
        weight: 0.75
        pass_threshold: 0.65
        fail_threshold: 0.45

      urgency_tone:
        enabled: true
        judge_model: mistral
        prompt: urgency_tone
        weight: 2.0
        pass_threshold: 0.75
        fail_threshold: 0.55

      entity_preservation:
        enabled: true
        judge_model: gemma3:4b
        prompt: quality_combined
        weight: 3.0
        pass_threshold: 0.85
        fail_threshold: 0.65

  # ─────────────────────────────────────────────────────────────────────────────
  # LOAN_FOCUSED: Loan / mortgage complaints
  # prompt_mode: mixed — same as stringent but with loan-specific per-criterion prompts
  # Models: mistral (primary), llama3.2 (lightweight)
  # ─────────────────────────────────────────────────────────────────────────────
  loan_focused:
    description: "Loan/mortgage complaints — timeline, action clarity, and urgency"
    pass_threshold: 0.75
    fail_threshold: 0.50
    prompt_mode: mixed           # some single, some combined
    criteria:

      faithfulness:
        enabled: true
        judge_model: mistral
        prompt: faithfulness
        weight: 1.5
        pass_threshold: 0.75
        fail_threshold: 0.50

      coverage:
        enabled: true
        judge_model: mistral
        prompt: coverage
        weight: 2.0            # loan complaints have complex timelines — coverage critical
        pass_threshold: 0.78
        fail_threshold: 0.55

      action_orientedness:
        enabled: true
        judge_model: mistral
        prompt: action_orientedness
        weight: 2.0            # what does the customer want? must be crystal clear
        pass_threshold: 0.78
        fail_threshold: 0.55

      conciseness:
        enabled: true
        judge_model: llama3.2
        prompt: quality_combined
        weight: 0.75
        pass_threshold: 0.60
        fail_threshold: 0.40

      clarity:
        enabled: true
        judge_model: llama3.2
        prompt: quality_combined
        weight: 1.0
        pass_threshold: 0.65
        fail_threshold: 0.45

      urgency_tone:
        enabled: true
        judge_model: mistral
        prompt: urgency_tone
        weight: 1.5
        pass_threshold: 0.75
        fail_threshold: 0.55

      entity_preservation:
        enabled: true
        judge_model: mistral
        prompt: quality_combined
        weight: 1.5
        pass_threshold: 0.78
        fail_threshold: 0.55
